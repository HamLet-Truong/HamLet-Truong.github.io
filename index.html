<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CV of Truong Van Long." />
    <title>Truong Van Long | CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main class="cv-sheet">
      <header class="cv-header">
        <img src="assets/CVProfile.jpg" alt="Profile" class="profile-pic" />

        <div class="header-info">
          <h1 id="name">TRUONG VAN LONG</h1>
          <p id="role" class="role"></p>
        </div>

        <div class="header-actions">
          <div class="lang-switch" aria-label="Language switcher">
            <button id="btnVi" class="lang-btn" type="button">VI</button>
            <button id="btnEn" class="lang-btn" type="button">EN</button>
          </div>
        </div>
      </header>

      <p id="summary" class="summary"></p>

      <section class="cv-content">
        <aside class="left-column">
          <section class="block" aria-labelledby="contactTitle">
            <h2 id="contactTitle">Thông Tin Liên Hệ</h2>
            <ul id="contactList" class="list compact"></ul>
          </section>

          <section class="block" aria-labelledby="skillsTitle">
            <h2 id="skillsTitle">Kỹ Năng Kỹ Thuật</h2>
            <div id="skills" class="stack"></div>
          </section>

          <section class="block" aria-labelledby="competenciesTitle">
            <h2 id="competenciesTitle">Năng Lực Frontend</h2>
            <ul id="competencies" class="chips"></ul>
          </section>

          <section class="block" aria-labelledby="additionalTitle">
            <h2 id="additionalTitle">Thông Tin Bổ Sung</h2>
            <ul id="additional" class="list"></ul>
          </section>
        </aside>

        <div class="right-column">
          <section class="block" aria-labelledby="educationTitle">
            <h2 id="educationTitle">Học Vấn</h2>
            <div id="education"></div>
          </section>

          <section class="block" aria-labelledby="projectsTitle">
            <h2 id="projectsTitle">Dự Án</h2>
            <div id="projects" class="project-list"></div>
          </section>
        </div>
      </section>

      <footer class="site-footer">
        <p>
          <span id="footerName"></span>
          <span id="footerRole"></span>
        </p>
      </footer>
    </main>

    <script src="assets/js/cv-data.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
